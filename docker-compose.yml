services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: risetabdimas-web
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - risetabdimas

  vite:
    build:
      context: .
      dockerfile: docker/vite/Dockerfile
    container_name: risetabdimas-vite
    working_dir: /var/www/html
    command: sh -c "npm install && npm run dev -- --host --port 5173"
    env_file:
      - .env.docker
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html
      - node_modules:/var/www/html/node_modules
    depends_on:
      - web
    networks:
      - risetabdimas

networks:
  risetabdimas:
    driver: bridge

volumes:
  node_modules:
