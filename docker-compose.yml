version: '3.8'

services:
  app:
    build:
      context: ./Docker/php
      dockerfile: Dockerfile
      args:
        INSTALL_NODE: "false"
    image: risetabdimas-app
    container_name: risetabdimas_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html:cached
      - ./vendor:/var/www/html/vendor
      - ./node_modules:/var/www/html/node_modules
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - LOG_CHANNEL=stack

  web:
    image: nginx:stable-alpine
    container_name: risetabdimas_web
    restart: unless-stopped
    ports:
      - 80:80
    volumes:
      - ./:/var/www/html:ro
      - ./Docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
