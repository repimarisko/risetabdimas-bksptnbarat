services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: risetabdimas-app
    restart: unless-stopped
    env_file:
      - .env.docker
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - risetabdimas

  web:
    image: nginx:1.27-alpine
    container_name: risetabdimas-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - risetabdimas

  vite:
    image: node:20-alpine
    container_name: risetabdimas-vite
    working_dir: /var/www/html
    command: sh -c "npm install && npm run dev -- --host --port 5173"
    env_file:
      - .env.docker
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html
      - node_modules:/var/www/html/node_modules
    depends_on:
      - app
    networks:
      - risetabdimas

  db:
    image: mysql:8.0
    container_name: risetabdimas-db
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      retries: 10
      timeout: 3s
    networks:
      - risetabdimas

networks:
  risetabdimas:
    driver: bridge

volumes:
  db_data:
  node_modules:
