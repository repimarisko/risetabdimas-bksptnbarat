version: '3.8'

services:
  app:
    build:
      context: ./Docker/php
      dockerfile: Dockerfile
    image: risetabdimas-app
    container_name: risetabdimas_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html:cached
      - ./vendor:/var/www/html/vendor
      - ./node_modules:/var/www/html/node_modules
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - LOG_CHANNEL=stack
    depends_on:
      - db

  web:
    image: nginx:stable-alpine
    container_name: risetabdimas_web
    restart: unless-stopped
    ports:
      - 80:80
    volumes:
      - ./:/var/www/html:ro
      - ./Docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: risetabdimas_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: risetabdimas
      MYSQL_USER: sailor
      MYSQL_PASSWORD: password
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - 3306:3306

volumes:
  dbdata:
    driver: local
